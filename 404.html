<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاش وببلاش</title>
    <meta name="description" content="افتح تطبيق كاش وببلاش — بيع وشراء المنتجات واستبدال النقاط بأمان.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background"></div>

    <div class="page-shell">
        <div class="accent-bar" aria-hidden="true"></div>
        <div class="container">
            <span class="page-badge">404</span>
            <div class="logo-wrap">
                <img src="assets/logo.png" alt="كاش وببلاش">
            </div>
            <h1 class="app-name">كاش وببلاش</h1>
            <p class="tagline">الصفحة غير موجودة — حمّل التطبيق وتابع من هناك.</p>

            <div class="store-buttons">
                <a href="https://play.google.com/store/apps/details?id=rar.cash.beblash" class="btn btn-google"
                    id="google-play-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
                        alt="Google Play">
                    <div class="btn-text">
                        <span>GET IT ON</span>
                        Google Play
                    </div>
                </a>

                <a href="https://apps.apple.com/app/6770988479" class="btn btn-apple" id="app-store-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg"
                        alt="App Store">
                    <div class="btn-text">
                        <span>Download on the</span>
                        App Store
                    </div>
                </a>
            </div>

            <p class="footer">جاري توجيهك إلى متجر التطبيقات...</p>
        </div>
    </div>

    <script>
        (function () {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            const isAndroid = /android/i.test(userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

            const googlePlayUrl = "https://play.google.com/store/apps/details?id=rar.cash.beblash";
            const appStoreUrl = "https://apps.apple.com/app/6770988479";

            if (isAndroid) {
                setTimeout(() => {
                    window.location.href = googlePlayUrl;
                }, 1500);
            } else if (isIOS) {
                setTimeout(() => {
                    window.location.href = appStoreUrl;
                }, 1500);
            } else {
                document.querySelector('.footer').innerText =
                    "اختر منصتك لتحميل التطبيق.";
            }
        })();
    </script>
</body>

</html>
